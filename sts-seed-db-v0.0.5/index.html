<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS 种子库 - 维护中</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.container { max-width: 560px; }
.spire-icon {
  font-size: 4rem;
  margin-bottom: 1.5rem;
  display: block;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.08); opacity: 1; }
}
h1 {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.75rem;
  color: #e6edf3;
}
p {
  font-size: 1rem;
  line-height: 1.7;
  color: #8b949e;
  margin-bottom: 2rem;
}
.status-box {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 2rem;
}
.status-label {
  display: inline-block;
  background: #da3633;
  color: #fff;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.75rem;
}
.status-item {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  font-size: 0.875rem;
  border-bottom: 1px solid #21262d;
}
.status-item:last-child { border-bottom: none; }
.status-item .label { color: #8b949e; }
.status-item .value { color: #e6edf3; font-weight: 600; }
.status-item .value.offline { color: #da3633; }
.status-item .value.recovering { color: #d29922; }
.progress-bar {
  width: 100%;
  height: 6px;
  background: #21262d;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.75rem;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #da3633, #d29922);
  border-radius: 3px;
  animation: fill 8s ease-in-out forwards;
}
@keyframes fill {
  0% { width: 0%; }
  100% { width: 100%; }
}
.footer {
  font-size: 0.8rem;
  color: #484f58;
  margin-top: 2rem;
}
.footer a { color: #58a6ff; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <span class="spire-icon">⚔️</span>
  <h1>STS 种子库 — 休整中</h1>
  <p>
    我们的数据库后端正在经历一次大休息。<br>
    种子数据暂时无法访问，请耐心等待。
  </p>
  <div class="status-box">
    <span class="status-label">STATUS</span>
    <div class="status-item">
      <span class="label">服务状态</span>
      <span class="value offline">离线维护</span>
    </div>
    <div class="status-item">
      <span class="label">预计恢复</span>
      <span class="value recovering">6月17日</span>
    </div>
    <div class="status-item">
      <span class="label">已收录种子</span>
      <span class="value">34</span>
    </div>
    <div class="status-item">
      <span class="label">种子们的心情</span>
      <span class="value">💤 呼呼大睡</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>
  <p class="footer">
    数据会在恢复后完好如初，请大家放心 🫡<br>
    有任何问题可联系 <a href="mailto:2992165229@qq.com">2992165229@qq.com</a>
  </p>
</div>
</body>
</html>
