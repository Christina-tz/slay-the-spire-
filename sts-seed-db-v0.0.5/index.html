<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS 种子库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Microsoft YaHei',Arial,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;}
.header{background:linear-gradient(135deg,#16213e,#0f3460);padding:20px;text-align:center;}
.header h1{font-size:2rem;margin-bottom:10px;}
.header .subtitle{color:#aaa;font-size:0.9rem;}
.search-box{padding:15px 20px;background:#16213e;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.search-input{padding:10px 15px;border-radius:25px;border:1px solid #333;background:#0f3460;color:#fff;width:300px;font-size:14px;}
.search-input:focus{outline:none;border-color:#e94560;}
.btn{padding:10px 20px;border-radius:25px;border:none;cursor:pointer;font-size:14px;transition:0.2s;}
.btn-primary{background:#e94560;color:#fff;}
.btn-primary:hover{background:#ff6b6b;}
.btn-secondary{background:#333;color:#fff;}
.btn-secondary:hover{background:#444;}
.filter-bar{padding:10px 20px;background:#16213e;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.filter-btn{padding:8px 16px;border-radius:20px;border:1px solid #333;background:transparent;color:#aaa;cursor:pointer;}
.filter-btn.active{background:#e94560;border-color:#e94560;color:#fff;}
.main{padding:20px;max-width:1400px;margin:0 auto;}
.stats{padding:10px 20px;background:#16213e;border-radius:10px;margin-bottom:20px;color:#aaa;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.card{background:#16213e;border-radius:12px;padding:15px;transition:0.2s;position:relative;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.3);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-game{font-size:0.75rem;padding:3px 8px;border-radius:10px;background:#e94560;color:#fff;}
.card-victory{font-size:0.75rem;padding:3px 8px;border-radius:10px;background:#4caf50;color:#fff;}
.card-seed{font-size:1.1rem;font-weight:bold;color:#fff;word-break:break-all;margin:8px 0;}
.card-char{color:#aaa;font-size:0.9rem;}
.card-info{color:#888;font-size:0.8rem;margin-top:5px;}
.card-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;}
.tag{padding:4px 10px;border-radius:15px;font-size:0.75rem;}
.tag-hu{background:#2e7d32;color:#fff;}
.tag-du{background:#c62828;color:#fff;}
.tag-custom{background:#1565c0;color:#fff;}
.card-desc{margin-top:10px;padding-top:10px;border-top:1px solid #333;color:#888;font-size:0.85rem;}
.btn-delete{position:absolute;top:10px;right:10px;background:#c62828;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;opacity:0;transition:0.2s;}
.card:hover .btn-delete{opacity:1;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-content{background:#16213e;border-radius:15px;padding:25px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h2{margin-bottom:15px;color:#fff;}
.modal-close{float:right;background:none;border:none;color:#aaa;font-size:1.5rem;cursor:pointer;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;margin-bottom:5px;color:#aaa;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0f3460;color:#fff;font-size:14px;}
.form-group textarea{resize:vertical;min-height:80px;}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4caf50;color:#fff;padding:12px 24px;border-radius:25px;z-index:2000;display:none;}
.toast.show{display:block;}
.footer{padding:20px;text-align:center;color:#666;font-size:0.8rem;}
.login-btn{background:#e94560;color:#fff;padding:10px 20px;border:none;border-radius:25px;cursor:pointer;}
.user-info{color:#aaa;font-size:0.9rem;}
</style>
</head>
<body>
<div class="header">
<h1>🎴 STS 种子库</h1>
<div class="subtitle">杀戮尖塔（Slay the Spire）种子分享平台 · STS1 & STS2</div>
</div>
<div class="search-box">
<input type="text" class="search-input" id="search-all" placeholder="搜索标签、种子代码..." autocomplete="off" oninput="onSearch('all')">
<button class="btn btn-primary" onclick="openModal()">+ 导入种子</button>
<button class="btn btn-secondary" id="loginBtn" onclick="toggleLogin()">登录</button>
</div>
<div class="filter-bar">
<button class="filter-btn active" data-filter="all" onclick="filterSeeds('all')">全部</button>
<button class="filter-btn" data-filter="STS1" onclick="filterSeeds('STS1')">STS1</button>
<button class="filter-btn" data-filter="STS2" onclick="filterSeeds('STS2')">STS2</button>
<button class="filter-btn" data-filter="hu" onclick="filterSeeds('hu')">胡种</button>
<button class="filter-btn" data-filter="du" onclick="filterSeeds('du')">毒种</button>
</div>
<div class="main">
<div class="stats" id="stats">共 0 个种子</div>
<div class="cards" id="cards"></div>
</div>
<div class="modal" id="modal">
<div class="modal-content">
<button class="modal-close" onclick="closeModal()">&times;</button>
<h2 id="modalTitle">导入种子</h2>
<form id="seedForm" onsubmit="submitSeed(event)">
<div class="form-row">
<div class="form-group">
<label>游戏</label>
<select id="game" required onchange="onGameChange()">
<option value="STS1">STS1</option>
<option value="STS2">STS2</option>
</select>
</div>
<div class="form-group">
<label>难度</label>
<select id="difficulty">
<option value="A0">A0</option>
</select>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>角色</label>
<select id="character">
<option value="">自动</option>
</select>
</div>
<div class="form-group">
<label>标签</label>
<select id="label">
<option value="hu">胡种</option>
<option value="du">毒种</option>
</select>
</div>
</div>
<div class="form-group">
<label>种子代码</label>
<input type="text" id="seed" placeholder="如: 4G5M1W7BRD" required>
</div>
<div class="form-group">
<label>标签（多选用逗号分隔）</label>
<input type="text" id="tags" placeholder="如: 暴政,抉择">
</div>
<div class="form-group">
<label>简介</label>
<textarea id="description" placeholder="可选描述..."></textarea>
</div>
<button type="submit" class="btn btn-primary" style="width:100%">提交</button>
</form>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
// Supabase 配置
const _sbUrl = 'https://sfywembffwejrpuwifci.supabase.co';
const _sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmeXdlbWJmZndlanJwdXdpZmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjUwNjUsImV4cCI6MjA5MTk0MTA2NX0.QcgD2UNkvO_WB8FxNm4FB7Ab8LWBnhHuMPjqPsJFLSo';
let _sbClient = null;
let _sbReady = false;

// 角色映射（支持中英文）
const charMap = {
    'IRONCLAD':'铁甲战士','THE_SILENT':'静默猎手','DEFECT':'故障机器人','WATCHER':'观者',
    'CHAMPION':'储君','HUNTER':'亡灵','MIRROR':'镜中人','ROOT':'根蔓',
    // 中文键（处理用户可能上传的中文角色名）
    '铁甲战士':'铁甲战士','静默猎手':'静默猎手','故障机器人':'故障机器人','观者':'观者',
    '储君':'储君','亡灵':'亡灵','镜中人':'镜中人','根蔓':'根蔓'
};
const charMapReverse = {'铁甲战士':'IRONCLAD','静默猎手':'THE_SILENT','故障机器人':'DEFECT','观者':'WATCHER','储君':'CHAMPION','亡灵':'HUNTER','镜中人':'MIRROR','根蔓':'ROOT'};

// 预设种子（为空，全部从 Supabase 动态加载）
const PRESET_SEEDS = [];

// 数据
let seedsData = [];
let currentFilter = 'all';
let currentUserId = null;
let editingId = null;

// 初始化
function _tryInit() {
    if (typeof supabase === 'undefined') { setTimeout(_tryInit, 100); return; }
    _sbClient = supabase.createClient(_sbUrl, _sbKey);
    _sbReady = true;
    _sbClient.auth.getSession().then(({ data: { session } }) => {
        if (session?.user) {
            currentUserId = session.user.id;
            document.getElementById('loginBtn').textContent = '已登录';
            document.getElementById('loginBtn').onclick = () => window.open(_sbUrl + '/dashboard', '_blank');
        }
    });
    loadSeedsFromDB();
    loadUserData();
}
setTimeout(_tryInit, 100);

async function loadSeedsFromDB() {
    if (!_sbReady) { setTimeout(loadSeedsFromDB, 300); return; }
    const { data, error } = await _sbClient.from('seeds').select('*').order('created_at', { ascending: false });
    if (!error && data) {
        // 直接使用数据库数据，不合并预设
        seedsData = data.map(row => ({
            id: row.id,
            seed: row.seed,
            char: row.character || 'UNKNOWN',
            game: row.game,
            label: row.label || 'du',
            tags: row.tags || [],
            description: row.description || '',
            difficulty: row.difficulty || 'A0',
            ascension: parseInt(row.difficulty?.replace('A','') || '0'),
            floor: row.floor || 0,
            victory: row.victory || false,
            user_id: row.user_id
        }));
        renderCurrent();
    }
}

function loadUserData() {
    const saved = localStorage.getItem('userSeeds');
    if (saved) {
        const userSeeds = JSON.parse(saved);
        userSeeds.forEach(s => {
            if (!seedsData.find(x => x.seed === s.seed && x.game === s.game)) {
                seedsData.push({...s, isLocal: true});
            }
        });
        renderCurrent();
    }
}

function renderCurrent() {
    const filtered = currentFilter === 'all' ? seedsData : seedsData.filter(s => 
        currentFilter === s.game || currentFilter === s.label
    );
    document.getElementById('stats').textContent = `共 ${seedsData.length} 个种子（显示 ${filtered.length} 个）`;
    const html = filtered.map(s => makeCard(s)).join('');
    document.getElementById('cards').innerHTML = html;
}

function makeCard(s) {
    const isUUID = s.id && s.id.length > 15;
    const canDelete = isUUID && s.user_id === currentUserId;
    const gameLabel = s.game === 'STS1' ? 'STS1' : 'STS2';
    const charName = charMap[s.char] || s.char;
    const vicLabel = s.victory ? '通关' : '未通关';
    const tagsHtml = s.tags?.length ? s.tags.map(t => `<span class="tag tag-custom">${t}</span>`).join('') : '';
    const descHtml = s.description ? `<div class="card-desc">${s.description}</div>` : '';
    return `<div class="card" onclick="viewSeed('${s.seed}','${s.game}')">
${canDelete ? `<button class="btn-delete" onclick="deleteSeed(event,'${s.id}')">🗑</button>` : ''}
<div class="card-top"><span class="card-game">${gameLabel}</span><span class="card-victory">${vicLabel}</span></div>
<div class="card-seed">${s.seed}</div>
<div class="card-char">${charName} · ${s.difficulty}</div>
<div class="card-info">标签: ${s.label === 'hu' ? '胡种' : '毒种'}</div>
<div class="card-tags">${tagsHtml}</div>
${descHtml}
</div>`;
}

async function deleteSeed(event, id) {
    if (!event) event = { stopPropagation: function() {} };
    event.stopPropagation();
    event.preventDefault();
    if (!_sbReady) { showToast('系统加载中，请稍候'); return; }
    if (!confirm('确定要删除这个种子吗？')) return;
    console.log('[DELETE] Attempting to delete id:', id);
    const { error } = await _sbClient.from('seeds').delete().eq('id', id);
    if (error) { showToast('删除失败：' + error.message); return; }
    const idx = seedsData.findIndex(s => s.id === id);
    if (idx >= 0) seedsData.splice(idx, 1);
    renderCurrent();
    showToast('已删除');
}

function filterSeeds(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-filter="${f}"]`).classList.add('active');
    renderCurrent();
}

function onSearch(type) {
    const q = document.getElementById('search-all').value.toLowerCase();
    const cards = document.querySelectorAll('.card');
    cards.forEach(c => {
        const text = c.textContent.toLowerCase();
        c.style.display = text.includes(q) ? '' : 'none';
    });
}

function openModal() {
    document.getElementById('modal').classList.add('active');
    document.getElementById('modalTitle').textContent = '导入种子';
    editingId = null;
    document.getElementById('seedForm').reset();
    onGameChange();
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function onGameChange() {
    const game = document.getElementById('game').value;
    const diff = document.getElementById('difficulty');
    const char = document.getElementById('character');
    diff.innerHTML = '';
    const maxAsc = game === 'STS1' ? 20 : 10;
    for (let i = 0; i <= maxAsc; i++) {
        diff.add(new Option('A' + i, 'A' + i));
    }
    char.innerHTML = '<option value="">自动</option>';
    const chars = game === 'STS1' 
        ? ['铁甲战士','静默猎手','故障机器人','观者']
        : ['储君','亡灵','镜中人','根蔓'];
    chars.forEach(c => char.add(new Option(c, charMapReverse[c])));
}

async function submitSeed(e) {
    e.preventDefault();
    if (!_sbReady) { showToast('系统加载中，请稍候'); return; }
    const { data: { session } } = await _sbClient.auth.getSession();
    if (!session) { showToast('请先登录'); return; }
    const seed = document.getElementById('seed').value.trim().toUpperCase();
    const game = document.getElementById('game').value;
    const difficulty = document.getElementById('difficulty').value;
    const character = document.getElementById('character').value || null;
    const label = document.getElementById('label').value;
    const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
    const description = document.getElementById('description').value;
    const { error } = await _sbClient.from('seeds').insert({
        seed, game, difficulty, character, label, tags, description, user_id: session.user.id
    });
    if (error) { showToast('提交失败：' + error.message); return; }
    showToast('提交成功！');
    closeModal();
    loadSeedsFromDB();
}

function toggleLogin() {
    if (currentUserId) {
        window.open(_sbUrl + '/dashboard', '_blank');
    } else {
        _sbClient.auth.signInWithOAuth({ provider: 'github' });
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function viewSeed(seed, game) {
    showToast(`查看种子: ${seed} (${game})`);
}
</script>
</body>
</html>
