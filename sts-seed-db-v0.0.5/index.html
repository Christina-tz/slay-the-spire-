<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC','JetBrains Mono','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;padding:20px;line-height:1.6;}
h1{text-align:center;color:#22d3ee;margin-bottom:4px;font-size:26px;letter-spacing:2px;}
.subtitle{text-align:center;color:#666;margin-bottom:16px;font-size:12px;}
/* 导航 */
.nav-bar{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
.nav-btn{background:#1a1a2e;color:#888;border:1px solid #333;padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .25s ease;}
.nav-btn:hover{background:#252540;color:#fff;}
.nav-btn.active{background:#22d3ee;color:#0f172a;border-color:#22d3ee;font-weight:bold;}
/* 区块 */
.section{display:none;}
.section.active{display:block;}
/* 分类标签 */
.cat-tabs{display:flex;gap:8px;margin-bottom:14px;justify-content:center;flex-wrap:wrap;}
.cat-tab{background:#1a1a2e;color:#666;border:1px solid #2a2a3e;padding:6px 14px;border-radius:16px;cursor:pointer;font-size:12px;}
.cat-tab:hover{background:#252540;color:#aaa;}
.cat-tab.active{background:#3a3a5e;color:#fff;border-color:#5a5a8e;}
/* 导入按钮 */
.import-bar{display:flex;justify-content:center;margin-bottom:16px;}
.btn-import{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#0f172a;border:none;padding:10px 28px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:bold;box-shadow:0 4px 15px rgba(34,211,238,0.3);transition:all .25s ease;}
.btn-import:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,211,238,0.5);}
/* 搜索框 */
.search-bar{display:flex;align-items:center;max-width:400px;margin:0 auto 14px;position:relative;}
.search-input{width:100%;background:#16162a;border:1px solid #2a2a44;border-radius:20px;padding:10px 16px 10px 40px;color:#e0e0e0;font-size:14px;font-family:inherit;outline:none;transition:all .25s ease;}
.search-input::placeholder{color:#555;}
.search-input:focus{border-color:#22d3ee;box-shadow:0 0 12px rgba(34,211,238,0.15);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:16px;pointer-events:none;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:4px;display:none;}
.search-clear.visible{display:block;}
.search-clear:hover{color:#22d3ee;}
/* 种子卡片网格 - 每行2个 */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
.seed-card{background:#16162a;border-radius:12px;padding:16px;border:1px solid #2a2a44;transition:all .25s ease;cursor:pointer;touch-action:tap;width:100%;text-align:left;}
.seed-card:hover{border-color:#22d3ee;transform:translateY(-3px);box-shadow:0 8px 25px rgba(34,211,238,0.15);}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.char-difficulty{display:flex;gap:8px;align-items:center;}
.char-badge{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#0f172a;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:bold;}
.diff-badge{background:#2a2a44;color:#888;padding:2px 8px;border-radius:10px;font-size:10px;}
.hudu{font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;}
.hu{background:#2e7d32;color:#fff;}
.du{background:#c62828;color:#fff;}
.seed-code{display:flex;gap:8px;align-items:center;margin:10px 0;}
.seed-num{font-family:'JetBrains Mono','Fira Code',Consolas,monospace;font-size:16px;color:#22d3ee;word-break:break-all;flex:1;letter-spacing:1px;}
.btn-copy{background:#1e1e2e;color:#888;border:1px solid #333;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s ease;}
.btn-copy:hover{background:#22d3ee;color:#0f172a;border-color:#22d3ee;}
/* 标签 */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.tag{background:#2a2a4a;color:#aaa;padding:2px 8px;border-radius:10px;font-size:11px;}
.tag.empty{opacity:0.5;font-style:italic;}.tag::before{content:'#';color:#666;}
.tag.empty{opacity:0.5;font-style:italic;}
/* 简介 */
.description{background:#1a1a2e;padding:10px;border-radius:8px;margin-top:8px;font-size:12px;color:#888;line-height:1.6;max-height:60px;overflow:hidden;}
.description img{max-width:100%;border-radius:4px;margin-top:8px;}
.image-upload-area{border:2px dashed #444;border-radius:8px;padding:15px;text-align:center;cursor:pointer;transition:border-color .3s;}
.image-upload-area:hover{border-color:#4a9eff;}
.upload-btn{color:#888;padding:10px;}
.image-preview-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.image-preview-item{position:relative;width:80px;height:80px;border-radius:4px;overflow:hidden;}
.image-preview-item img{width:100%;height:100%;object-fit:cover;}
.image-preview-item .remove-btn{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:1;}
.description:empty{display:none;}
.meta{font-size:10px;color:#444;margin-top:6px;}.seed-detail{padding:16px;background:#16162a;border-radius:8px;margin:12px 0;}.seed-detail .seed-code{font-size:20px;color:#64b5f6;margin-bottom:8px;}.seed-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}.seed-footer .meta{font-size:12px;color:#888;}.seed-footer .btn-copy{margin-left:auto;}
/* 模态框 */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-content{background:#1a1a2e;border-radius:16px;padding:24px;width:90%;max-width:420px;border:1px solid #333;max-height:90vh;overflow-y:auto;}
.modal h2{color:#22d3ee;margin-bottom:16px;font-size:18px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;color:#888;margin-bottom:6px;font-size:12px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0f0f1a;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-size:14px;}
.form-group textarea{resize:vertical;min-height:80px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#22d3ee;}
/* 详情弹窗样式 */
.modal-header{position:relative;margin-bottom:16px;}
.modal-header h3{color:#fff;font-size:18px;margin:0;}
.close-btn{position:absolute;right:-8px;top:-8px;width:32px;height:32px;background:#c62828;border-radius:50%;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.close-btn:hover{background:#f44336;transform:scale(1.1);}
.detail-row{display:flex;align-items:flex-start;margin-bottom:12px;}
.detail-label{color:#888;font-size:12px;min-width:50px;}
.detail-value{color:#fff;font-size:14px;}
.detail-value.seed-code{color:#22d3ee;font-size:16px;font-weight:bold;font-family:'JetBrains Mono',monospace;}
.detail-tags-box,.detail-desc-box{flex:1;background:#16162a;border-radius:8px;padding:10px;}
.detail-tags-box .tag{background:#252540;padding:4px 10px;border-radius:12px;font-size:11px;margin:2px;}
.detail-tags-box .empty,.detail-desc-box{color:#555;font-size:13px;}
.char-select{display:flex;gap:8px;flex-wrap:wrap;}
.char-option{background:#0f0f1a;border:1px solid #333;padding:6px 12px;border-radius:16px;cursor:pointer;font-size:12px;color:#666;transition:all .2s;}
.char-option:hover{background:#252540;color:#fff;}
.char-option.selected{background:#22d3ee;color:#0f172a;border-color:#22d3ee;}
/* 预设标签 */
.preset-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.preset-tag{background:#252540;border:1px solid #3a3a5e;padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px;color:#888;transition:all .2s;}
.preset-tag:hover{background:#3a3a5e;color:#fff;}
.preset-tag.selected{background:#22d3ee;color:#0f172a;border-color:#22d3ee;}
/* 按钮 */
.btn-row{display:flex;gap:10px;margin-top:16px;}
.btn-cancel,.btn-submit{flex:1;padding:12px;border-radius:24px;font-size:14px;cursor:pointer;border:none;transition:all .2s;}
.btn-cancel{background:#333;color:#888;}
.btn-cancel:hover{background:#444;color:#fff;}
.btn-submit{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#0f172a;font-weight:bold;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(34,211,238,0.4);}
.btn-delete{background:#b71c1c;color:#fff;border:none;padding:6px 14px;border-radius:16px;cursor:pointer;font-size:11px;margin-left:auto;}
.btn-delete:hover{background:#d32f2f;}
/* 提示 */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ff6b9d;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;display:none;z-index:9999;}
.empty{text-align:center;padding:40px;color:#444;font-size:14px;}
.char-count{font-size:10px;color:#555;text-align:right;margin-top:4px;}
/* 游戏切换 */
.game-tabs{display:flex;gap:8px;margin-bottom:12px;justify-content:center;}
.game-tab{background:transparent;border:1px solid #333;padding:6px 14px;border-radius:16px;cursor:pointer;font-size:12px;color:#666;}
.game-tab.active{background:#22d3ee;color:#0f172a;border-color:#22d3ee;}
/* 角色筛选 */
.char-tabs{display:flex;gap:6px;margin-bottom:10px;justify-content:center;flex-wrap:wrap;}
.char-tab{background:#1a1a2e;border:1px solid #2a2a44;padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px;color:#666;transition:all .2s ease;}
.char-tab:hover{background:#252540;color:#aaa;}
.char-tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6;}
/* Auth */
.auth-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
.btn-auth{background:#1a1a2e;color:#22d3ee;border:1px solid #22d3ee;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .25s;}
.btn-auth:hover{background:#22d3ee;color:#0f172a;}
#auth-user{color:#888;font-size:13px;}
.btn-logout{background:transparent;color:#555;border:1px solid #333;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .25s;}
.btn-logout:hover{background:#333;color:#fff;}
/* Auth modal */
#authModal .modal-content{max-width:360px;}
.auth-tabs{display:flex;margin-bottom:16px;}
.auth-tab{flex:1;padding:10px;background:#1a1a2e;border:1px solid #2a2a44;color:#555;cursor:pointer;font-size:14px;border-radius:8px;text-align:center;transition:all .2s;}
.auth-tab:first-child{border-radius:8px 0 0 8px;}
.auth-tab:last-child{border-radius:0 8px 8px 0;}
.auth-tab.active{background:#22d3ee;color:#0f172a;border-color:#22d3ee;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;color:#888;font-size:12px;margin-bottom:4px;}
.form-group input{width:100%;background:#0f0f1a;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:14px;font-family:inherit;outline:none;}
.form-group input:focus{border-color:#22d3ee;}
#auth-error{color:#ef5350;font-size:12px;margin-top:8px;display:none;}
#auth-success{color:#66bb6a;font-size:12px;margin-top:8px;display:none;}
.auth-error{color:#ef5350;font-size:12px;margin-top:8px;min-height:16px;}

/* Donate */
.donate-btn{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;box-shadow:0 4px 15px rgba(245,158,11,0.4);z-index:1000;transition:transform 0.2s,box-shadow 0.2s;display:flex;align-items:center;justify-content:center;}
.donate-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(245,158,11,0.6);}
.donate-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1001;justify-content:center;align-items:center;}
.donate-overlay.active{display:flex;}
.donate-modal{background:#1a1a2e;border-radius:16px;padding:32px;text-align:center;max-width:360px;width:90%;position:relative;animation:donateIn 0.3s ease;}
@keyframes donateIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.donate-modal h3{color:#f59e0b;font-size:20px;margin:0 0 8px;}
.donate-modal p{color:#94a3b8;font-size:14px;margin:0 0 20px;}
.donate-modal img{width:200px;height:200px;border-radius:12px;border:2px solid #334155;margin:0 auto 16px;display:block;}
.donate-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#64748b;font-size:24px;cursor:pointer;padding:4px;}
.donate-close:hover{color:#e2e8f0;}

/* 点赞评论 */
/* === 现代点赞UI === */
.like-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:50px;border:none;background:rgba(255,255,255,0.06);color:#9ca3af;cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);user-select:none;-webkit-tap-highlight-color:transparent;}
.like-btn:hover{background:rgba(255,255,255,0.12);color:#d1d5db;transform:scale(1.04);}
.like-btn:active{transform:scale(0.96);}
.like-btn.liked{background:rgba(239,68,68,0.12);color:#f43f5e;}
.like-btn.liked .like-icon-svg{fill:#f43f5e;stroke:#f43f5e;}
.like-btn.liked .like-count-num{color:#f43f5e;font-weight:700;}
.like-icon-svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);transform-origin:center;}
.like-count-num{font-size:14px;font-weight:500;min-width:16px;text-align:center;transition:all 0.25s ease;}
/* 点赞动画 */
@keyframes likePop{
  0%{transform:scale(1);}
  30%{transform:scale(1.35);}
  50%{transform:scale(0.95);}
  70%{transform:scale(1.12);}
  100%{transform:scale(1);}
}
@keyframes likeBurst{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-24px) scale(1.6);}
}
@keyframes heartBeat{
  0%,100%{transform:scale(1);}
  15%{transform:scale(1.25);}
  30%{transform:scale(1);}
  45%{transform:scale(1.15);}
  60%{transform:scale(1);}
}
.like-btn.animating .like-icon-svg{animation:heartBeat 0.5s ease forwards;}
.like-pop-burst{position:absolute;pointer-events:none;font-size:13px;font-weight:700;color:#f43f5e;animation:likeBurst 0.7s ease forwards;z-index:100;}
/* 卡片点赞 */
.card-likes{position:absolute;right:10px;bottom:10px;display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(15,15,20,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);font-size:11px;color:#9ca3af;transition:all 0.2s ease;z-index:2;}
.card-likes:hover{background:rgba(25,25,35,0.85);border-color:rgba(255,255,255,0.14);color:#d1d5db;}
.card-likes .card-like-icon{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.card-likes .like-num{font-size:11px;font-weight:500;min-width:10px;text-align:center;transition:all 0.2s ease;}
.card-likes.has-likes{color:#60a5fa;border-color:rgba(96,165,250,0.25);background:rgba(59,130,246,0.08);}
.comments-section{flex-direction:column;}
.comments-list{max-height:200px;overflow-y:auto;width:100%;margin-bottom:10px;}
.comment-item{padding:8px 0;border-bottom:1px solid #333;}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.comment-user{font-weight:bold;color:#4fc3f7;}
.comment-time{font-size:11px;color:#888;}
.comment-content{word-break:break-all;color:#ddd;}
.comment-img{max-width:150px;max-height:100px;border-radius:4px;margin-top:6px;cursor:pointer;}
.comment-delete{font-size:11px;color:#f44336;cursor:pointer;margin-left:8px;}
.comment-delete:hover{text-decoration:underline;}
.comment-input-box{width:100%;}
.comment-input-box textarea{width:100%;height:50px;background:#1a1a1a;border:1px solid #444;border-radius:4px;color:#fff;padding:8px;resize:none;}
.comment-actions{display:flex;align-items:center;gap:8px;margin-top:6px;}
.img-upload-btn{cursor:pointer;color:#888;font-size:13px;}
.img-upload-btn:hover{color:#fff;}
.img-preview{font-size:12px;color:#4fc3f7;}
.send-btn{margin-left:auto;padding:4px 12px;background:#2e7d32;border:none;border-radius:4px;color:#fff;cursor:pointer;}
.send-btn:hover{background:#388e3c;}
.card-likes{position:absolute;right:8px;bottom:8px;font-size:12px;color:#999;background:rgba(0,0,0,0.6);padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:3px;}
.like-icon-mini{font-size:11px;opacity:0.8;}</style>

    </label>

<script>
// 角色选项
const CHARS_STS1 = [
 {id:'IRONCLAD', name:'战士'},
 {id:'SILENT', name:'猎手'},
 {id:'DEFECT', name:'机器人'},
 {id:'WATCHER', name:'观者'}
];
const CHARS_STS2 = [
 {id:'IRONCLAD', name:'战士'},
 {id:'SILENT', name:'猎手'},
 {id:'DEFECT', name:'机器人'},
 {id:'CHAMPION', name:'储君'},
 {id:'NECROBINDER', name:'亡灵'}
];

// 初始数据
// 种子数据：初始为空，从 localStorage 或数据库加载
let seedsData = [];

// 从 localStorage 读取已有数据（用户自己导入的）
(function loadFromLocalStorage() {
 try {
 const saved = localStorage.getItem('stsSeedData');
 if (saved) {
 const parsed = JSON.parse(saved);
 if (Array.isArray(parsed) && parsed.length > 0) {
 seedsData = parsed;
 }
 }
 } catch(e) {}
})();

// 从 Supabase 数据库加载用户数据（替换本地数据，保证删掉的种子不再出现）
async function loadSeedsFromDB() {
 if (!_sbReady) { setTimeout(loadSeedsFromDB, 300); return; }
 const { data, error } = await _sbClient.from('seeds').select('*').order('created_at', { ascending: false });
 if (error) { console.warn('加载种子失败:', error.message); renderCurrent(); return; }
 if (!data || data.length === 0) { renderCurrent(); return; }
 // 用数据库数据完全替换 seedsData，保证已删除的记录彻底消失
 // 保留 id 和 user_id 用于删除功能
 seedsData = data.map(row => ({
 id: row.id,
 user_id: row.user_id,
 seed: row.seed,
 game: row.game,
 char: row.character || '',
 label: row.victory ? 'hu' : 'du',
 difficulty: row.difficulty || '低',
 floor: row.floor_reached || 0,
 victory: row.victory || false,
 ascension: row.ascension || 0,
 tags: row.tags || [],
 description: row.description || ''
 }));
 // 刷新卡片（删除按钮是否显示取决于当前登录用户）
 sessionStorage.setItem('_sbRerender', '1');
 renderCurrent();
}
(function waitForSB() { if (_sbReady) { loadSeedsFromDB(); } else { setTimeout(waitForSB, 200); } })();

// 统计
function getStats(game) {
 const arr = game === 'all' ? seedsData : seedsData.filter(s => s.game === game);
 const hu = arr.filter(s => s.label === 'hu').length;
 const du = arr.filter(s => s.label === 'du').length;
 return { total: arr.length, hu, du };
}

// 渲染卡片
function makeCard(s) {
 const charMap = {IRONCLAD:'铁甲',THE_SILENT:'静默',SILENT:'静默',DEFECT:'机器人',WATCHER:'观者',CHAMPION:'储君',REGENT:'储君',NECROBINDER:'亡灵'};
 const cl = charMap[s.char] || s.char;
 const diff = s.difficulty || '低';
 const hudu = s.label === 'hu' ? '胡种' : '毒种';
 const huduClass = s.label === 'hu' ? 'hu' : 'du';
 const tagsHtml = s.tags && s.tags.length
 ? '<div class="tags">' + s.tags.map(t => '<span class="tag">'+t+'</span>').join('') + '</div>'
 : '<div class="tags"><span class="tag empty">#无标签</span></div>';
 const descHtml = s.description
 ? '<div class="description">'+s.description.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/!\[image\]\(([^)]+)\)/g, '<img src="$1" loading="lazy">')+'</div>'
 : '';
 const canDelete = currentUserId && s.user_id === currentUserId;
 const deleteBtn = canDelete
 ? '<span class="btn-delete" data-action="delete" data-id="'+s.id+'">🗑 删除</span>'
 : '';
 return '<div class="seed-card" data-id="'+s.id+'" data-user-id="'+(s.user_id||'')+'" data-seed="'+s.seed+'" data-game="'+s.game+'">' +
 '<div class="card-top"><div class="char-difficulty"><span class="char-badge">'+cl+'</span><span class="diff-badge">'+diff+'</span></div><span class="hudu '+huduClass+'">'+hudu+'</span>'+deleteBtn+'</div>' +
 '<div class="seed-seed"><span class="seed-num">'+s.seed+'</span><span class="btn-copy" data-action="copy">📋 复制</span></div>' +
 tagsHtml + descHtml +
 '<div class="meta">'+s.game + (s.floor ? ' · '+s.floor+'层' : '')+'</div>' +
 '<div class="card-likes" data-seed-id="'+(s.id||'')+'"><svg class="card-like-icon" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg><span class="like-num">-</span></div></div>';
}

function render(containerId, arr) {
 const container = document.getElementById(containerId);
 if (!arr.length) {
 container.innerHTML = '<div class="empty">暂无数据</div>';
 return;
 }
 container.innerHTML = arr.map(makeCard).join('');
}

// 事件委托：统一处理卡片点击（查看详情、删除、复制）
document.addEventListener('click', function(e) {
 // 删除按钮
 const delBtn = e.target.closest('[data-action="delete"]');
 if (delBtn) {
  e.stopPropagation();
  e.preventDefault();
  const id = delBtn.getAttribute('data-id');
  if (id) deleteSeed(e, id);
  return;
 }
 // 复制按钮
 const copyBtn = e.target.closest('[data-action="copy"]');
 if (copyBtn) {
  e.stopPropagation();
  e.preventDefault();
  const card = copyBtn.closest('.seed-card');
  if (card) copySeed(e, card.dataset.seed);
  return;
 }
 // 查看详情（点击卡片本身）
 const card = e.target.closest('.seed-card');
 if (card && card.dataset.seed) {
  viewSeed(card.dataset.seed);
 }
});

// 筛选
let currentGame = 'all';
let currentFilter = 'all';
let currentChar = '';

function showGame(game) {
 currentGame = game;
 currentFilter = 'all';
 currentChar = '';
 document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
 document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
 document.getElementById('sec-' + game.toLowerCase()).classList.add('active');
 event.target.classList.add('active');
 updateGameTabs();
 updateCharTabs();
 renderCurrent();
}

function filterGame(game, filter) {
 currentGame = game;
 currentFilter = filter;
 currentChar = '';
 updateGameTabs();
 updateCharTabs();
 renderCurrent();
}

function updateGameTabs() {
 const sec = document.getElementById('sec-' + currentGame);
 if (!sec) return;
 sec.querySelectorAll('.game-tab').forEach((btn, i) => {
 const f = ['all','hu','du'][i];
 btn.classList.toggle('active', f === currentFilter);
 });
}

function filterChar(game, char) {
 currentGame = game;
 currentChar = char;
 updateGameTabs();
 updateCharTabs();
 renderCurrent();
}

function updateCharTabs() {
 const sec = document.getElementById('sec-' + currentGame);
 if (!sec) return;
 const charTabs = sec.querySelector('.char-tabs');
 if (!charTabs) return;
 charTabs.querySelectorAll('.char-tab').forEach(btn => {
 const charId = btn.getAttribute('onclick').match(/'([^']*)'/g)[1].replace(/'/g, '');
 btn.classList.toggle('active', charId === currentChar);
 });
}

function renderCurrent() {
 const stats = getStats(currentGame);
 let arr = currentGame === 'all' ? seedsData : seedsData.filter(s => s.game.toLowerCase() === currentGame.toLowerCase());
 if (currentFilter !== 'all') {
 arr = arr.filter(s => s.label === currentFilter);
 }

 // 角色筛选
 if (currentChar) {
 arr = arr.filter(s => s.char === currentChar);
 }
 // 搜索过滤
 const query = getSearchQuery(currentGame);
 if (query) {
 const q = query.toLowerCase();
 arr = arr.filter(s => {
 if (s.seed.toLowerCase().includes(q)) return true;
 if (s.tags && s.tags.some(t => t.toLowerCase().includes(q))) return true;
 if (s.description && s.description.toLowerCase().includes(q)) return true;
 const charMap = {IRONCLAD:'铁甲',THE_SILENT:'静默',SILENT:'静默',DEFECT:'缺陷',WATCHER:'观者',CHAMPION:'储君',REGENT:'储君',NECROBINDER:'亡灵'};
 if ((charMap[s.char]||s.char).includes(q)) return true;
 return false;
 });
 }
 const containerId = currentGame + '-cards';
 render(containerId, arr);
 setTimeout(loadAllLikes, 200);
}

// 搜索功能
function getSearchQuery(game) {
 const el = document.getElementById('search-' + game);
 return el ? el.value.trim() : '';
}

function onSearch(game) {
 const el = document.getElementById('search-' + game);
 const clearBtn = document.getElementById('clear-' + game);
 if (clearBtn) clearBtn.classList.toggle('visible', el.value.length > 0);
 // 如果当前正在看的就是这个game，重新渲染
 if (game === currentGame) {
 renderCurrent();
 }
}

function clearSearch(game) {
 const el = document.getElementById('search-' + game);
 if (el) el.value = '';
 const clearBtn = document.getElementById('clear-' + game);
 if (clearBtn) clearBtn.classList.remove('visible');
 if (game === currentGame) {
 renderCurrent();
 }
}

// 复制
function copySeed(event, seed) {
 event.stopPropagation();
 navigator.clipboard.writeText(seed).then(() => showToast('已复制: ' + seed));
}


async function loadAllLikes() {
  if (!_sbReady || !seedsData.length) return;
  const ids = seedsData.filter(s => s.id).map(s => s.id);
  if (!ids.length) return;
  try {
    const { data } = await _sbClient.from('likes').select('seed_id').in('seed_id', ids);
    const counts = {};
    (data || []).forEach(l => counts[l.seed_id] = (counts[l.seed_id] || 0) + 1);
    document.querySelectorAll('.card-likes').forEach(el => {
      const num = el.querySelector('.like-num');
      const id = el.getAttribute('data-seed-id');
      if (num && id) {
        const c = counts[id] || 0;
        num.textContent = c;
        if (c > 0) el.classList.add('has-likes');
      }
    });
  } catch(e) { console.log('loadAllLikes error:', e); }
}
function viewSeed(seed) {
 const s = seedsData.find(x => x.seed === seed);
 if (!s) return;
 _currentSeedId = s.id;
 _currentLiked = false;
 document.getElementById('detailSeed').textContent = s.seed;
 document.getElementById('detailGame').textContent = s.game === 'STS1' ? '杀戮尖塔1' : '杀戮尖塔2';
 // 角色转中文
 const charMap = s.game === 'STS1' ? CHARS_STS1 : CHARS_STS2;
 const charObj = charMap.find(c => c.id === s.char);
 document.getElementById('detailChar').textContent = charObj ? charObj.name : s.char;
 document.getElementById('detailDifficulty').textContent = s.difficulty;
 // 标签
 const tagsEl = document.getElementById('detailTags');
 tagsEl.innerHTML = s.tags.length ? s.tags.map(t => '<span class="tag">'+t+'</span>').join('') : '<span class="empty">无</span>';
 // 简介
 const descEl = document.getElementById('detailDesc');
 if (s.description) {
   descEl.innerHTML = s.description
     .replace(/</g,'&lt;').replace(/>/g,'&gt;')
     .replace(/\!\[image\]\(([^)]+)\)/g, '<img src="$1" loading="lazy" style="max-width:100%;border-radius:8px;margin-top:8px;cursor:pointer;" onclick="window.open(this.src)">');
 } else {
   descEl.textContent = '无';
 }
 if (s.id) loadLikesAndComments(s.id);
 document.getElementById('detailModal').style.display = 'flex';
}
// 点赞评论功能
let _currentSeedId = null;
let _currentLiked = false;

async function loadLikesAndComments(seedId) {
  console.log('loadLikesAndComments called, seedId:', seedId, '_sbReady:', _sbReady);
  if (!_sbReady) { console.log('Supabase not ready, retrying...'); setTimeout(() => loadLikesAndComments(seedId), 300); return; }
  _currentSeedId = seedId;
  
  const { count } = await _sbClient.from('likes').select('*', { count: 'exact', head: true }).eq('seed_id', seedId);
  document.getElementById('likeCount').textContent = count || 0;
  
  const user = _sbClient.auth.getUser ? (await _sbClient.auth.getUser()).data.user : null;
  if (user) {
    const { data: myLike } = await _sbClient.from('likes').select('id').eq('seed_id', seedId).eq('user_id', user.id).maybeSingle();
    _currentLiked = !!myLike;
    document.getElementById('likeBtn').classList.toggle('liked', _currentLiked);
  } else {
    _currentLiked = false;
    document.getElementById('likeBtn').classList.remove('liked');
  }
  
  const { data: comments } = await _sbClient.from('comments').select('id,user_id,content,image_url,created_at').eq('seed_id', seedId).order('created_at', { ascending: false });
  renderComments(comments || [], user);
}

async function toggleLike() {
  console.log('toggleLike called, _sbReady:', _sbReady, '_currentSeedId:', _currentSeedId, '_currentLiked:', _currentLiked);
  if (!_sbReady) { console.log('Supabase not ready'); return; }
  const user = _sbClient.auth.getUser ? (await _sbClient.auth.getUser()).data.user : null;
  if (!user) { showToast('请先登录'); return; }
  if (_currentLiked) return;
  
  const btn = document.getElementById('likeBtn');
  const countEl = document.getElementById('likeCount');
  
  const { error } = await _sbClient.from('likes').upsert({ seed_id: _currentSeedId, user_id: user.id }, { onConflict: 'seed_id,user_id' });
  if (!error) {
    _currentLiked = true;
    btn.classList.add('liked','animating');
    countEl.textContent = parseInt(countEl.textContent || '0') + 1;
    
    // 弹出+1动画
    const burst = document.createElement('span');
    burst.className = 'like-pop-burst';
    burst.textContent = '+1';
    burst.style.left = (btn.offsetLeft + btn.offsetWidth / 2 - 10) + 'px';
    burst.style.top = (btn.offsetTop - 8) + 'px';
    btn.parentElement.style.position = 'relative';
    btn.parentElement.appendChild(burst);
    setTimeout(() => burst.remove(), 700);
    
    // 移除动画类
    setTimeout(() => btn.classList.remove('animating'), 600);
    
    // 更新卡片上的数字
    updateCardLikeNum(_currentSeedId, parseInt(countEl.textContent));
    
    showToast('❤️ 点赞成功');
  } else if (error.code === '23505') {
    showToast('已经赞过啦~');
  } else {
    showToast('点赞失败');
  }
}

function updateCardLikeNum(seedId, num) {
  document.querySelectorAll('.card-likes[data-seed-id="'+seedId+'"]').forEach(el => {
    const n = el.querySelector('.like-num');
    if (n) { n.textContent = num; el.classList.add('has-likes'); }
  });
}

function renderComments(comments, currentUser) {
  const list = document.getElementById('commentsList');
  if (!comments.length) { list.innerHTML = '<div style="color:#888;font-size:13px;">暂无评论</div>'; return; }
  list.innerHTML = comments.map(c => {
    const time = formatTimeAgo(new Date(c.created_at));
    const canDel = currentUser && currentUser.id === c.user_id;
    return '<div class="comment-item"><div class="comment-header"><span class="comment-user">用户' + c.user_id.slice(0,6) + '</span><span><span class="comment-time">' + time + '</span>' + (canDel ? '<span class="comment-delete" onclick="deleteComment(\'' + c.id + '\')">删除</span>' : '') + '</span></div><div class="comment-content">' + escapeHtml(c.content) + '</div>' + (c.image_url ? '<img src="' + c.image_url + '" class="comment-img" onclick="window.open(this.src)">' : '') + '</div>';
  }).join('');
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatTimeAgo(d) {
  const diff = Date.now() - d.getTime(), m = Math.floor(diff / 60000);
  if (m < 1) return '刚刚';
  if (m < 60) return m + '分钟前';
  const h = Math.floor(m / 60);
  if (h < 24) return h + '小时前';
  return Math.floor(h / 24) + '天前';
}

let _selectedImg = null;
function previewImage(inp) {
  if (inp.files && inp.files[0]) {
    const f = inp.files[0];
    if (f.size > 2 * 1024 * 1024) { showToast('图片不能超过2MB'); inp.value = ''; return; }
    _selectedImg = f;
    document.getElementById('imgPreview').textContent = f.name.slice(0, 15) + (f.name.length > 15 ? '...' : '');
  }
}

async function submitComment() {
  if (!_sbReady) return;
  const user = _sbClient.auth.getUser ? (await _sbClient.auth.getUser()).data.user : null;
  if (!user) { showToast('请先登录'); return; }
  
  const content = document.getElementById('commentInput').value.trim();
  if (!content && !_selectedImg) { showToast('请输入评论'); return; }
  
  let imageUrl = null;
  if (_selectedImg) {
    const ext = _selectedImg.name.split('.').pop();
    const path = user.id + '/' + Date.now() + '.' + ext;
    const { error: upErr } = await _sbClient.storage.from('comment-images').upload(path, _selectedImg);
    if (upErr) { showToast('图片上传失败'); return; }
    const { data: urlData } = _sbClient.storage.from('comment-images').getPublicUrl(path);
    imageUrl = urlData.publicUrl;
  }
  
  const { error } = await _sbClient.from('comments').insert({ seed_id: _currentSeedId, user_id: user.id, content: content, image_url: imageUrl });
  if (!error) {
    document.getElementById('commentInput').value = '';
    document.getElementById('commentImage').value = '';
    document.getElementById('imgPreview').textContent = '';
    _selectedImg = null;
    showToast('评论成功');
    loadLikesAndComments(_currentSeedId);
  } else {
    showToast('评论失败');
  }
}

async function deleteComment(cid) {
  if (!confirm('确定删除？')) return;
  const { error } = await _sbClient.from('comments').delete().eq('id', cid);
  if (!error) { showToast('已删除'); loadLikesAndComments(_currentSeedId); }
  else showToast('删除失败');
}


function showToast(msg) {
 const t = document.getElementById('toast');
 t.textContent = msg;
 t.style.display = 'block';
 setTimeout(() => t.style.display = 'none', 2000);
}

async function deleteSeed(event, id) {
 event.stopPropagation();
 event.preventDefault();
 if (!_sbReady) { showToast('系统加载中，请稍候'); return; }
 if (!confirm('确定要删除这个种子吗？')) return;
 const { error } = await _sbClient.from('seeds').delete().eq('id', id);
 if (error) { showToast('删除失败：' + error.message); return; }
 await loadSeedsFromDB();
 showToast('已删除');
}

// 导入功能
let selectedChar = '';
let selectedTags = [];

async function openImport() {
 if (!_sbReady) { showToast('Auth系统加载中，请稍候'); return; }
 const { data: { session } } = await _sbClient.auth.getSession();
 if (!session) { openAuth(); showToast('登录后可导入种子'); return; }
 document.getElementById('importModal').classList.add('active');
 document.getElementById('importSeed').value = '';
 document.getElementById('importTags').value = '';
 document.getElementById('importDesc').value = '';
  selectedImages = [];
  renderImagePreviews();
 selectedChar = '';
 selectedTags = [];
 renderCharOptions();
 updateDescLen();
}

function renderCharOptions() {
 const game = document.getElementById('importGame').value;
 const chars = game === 'STS2' ? CHARS_STS2 : CHARS_STS1;
 const container = document.getElementById('charSelect');
 container.innerHTML = chars.map(c => 
 '<span class="char-option" data-char="'+c.id+'" onclick="selectChar(this)">'+c.name+'</span>'
 ).join('');
}

// 游戏切换时更新角色选项
document.getElementById('importGame').addEventListener('change', function() {
 selectedChar = '';
 renderCharOptions();
});

// 标签输入回车确认
document.getElementById('importTags').addEventListener('keydown', function(e) {
 if (e.key === 'Enter') {
 e.preventDefault();
 const tag = this.value.trim();
 if (tag.length >= 1 && tag.length <= 10) {
 if (!selectedTags.includes(tag) && selectedTags.length < 5) {
 selectedTags.push(tag);
 renderTags();
 }
 this.value = '';
 } else if (tag.length > 10) {
 showToast('标签限1-10字');
 }
 }
});

function renderTags() {
 const container = document.getElementById('importTags');
 const tagsDisplay = selectedTags.map(t => 
 '<span class="tag" onclick="removeTag(this)">'+t+'×</span>'
 ).join('');
 // 用一个div显示已选标签
 let td = document.getElementById('tagsDisplay');
 if (!td) {
 td = document.createElement('div');
 td.id = 'tagsDisplay';
 td.className = 'tags';
 td.style.marginTop = '8px';
 container.parentNode.insertBefore(td, container.nextSibling);
 }
 td.innerHTML = tagsDisplay;
}

function removeTag(el) {
 const tag = el.textContent.replace('×', '');
 selectedTags = selectedTags.filter(t => t !== tag);
 renderTags();
}

function closeImport() {
 document.getElementById('importModal').classList.remove('active');
}

function selectChar(el) {
 document.querySelectorAll('#charSelect .char-option').forEach(e => e.classList.remove('selected'));
 el.classList.add('selected');
 selectedChar = el.dataset.char;
}

function toggleTag(el) {
 el.classList.toggle('selected');
 const tag = el.textContent;
 if (el.classList.contains('selected')) {
 if (!selectedTags.includes(tag) && selectedTags.length < 3) {
 selectedTags.push(tag);
 }
 } else {
 selectedTags = selectedTags.filter(t => t !== tag);
 }
}

function updateDescLen() {
 const len = document.getElementById('importDesc').value.length;
 document.getElementById('descLen').textContent = len;
}
document.getElementById('importDesc').addEventListener('input', updateDescLen);

let selectedImages = []; // 存储选中的图片文件

function handleImageSelect(input) {
  const files = input.files;
  if (!files || files.length === 0) return;
  
  const remaining = 3 - selectedImages.length;
  if (remaining <= 0) {
    showToast('最多上传3张图片');
    return;
  }
  
  const filesToAdd = Array.from(files).slice(0, remaining);
  
  for (const file of filesToAdd) {
    if (file.size > 2 * 1024 * 1024) {
      showToast(file.name + ' 超过2MB');
      continue;
    }
    selectedImages.push(file);
  }
  
  renderImagePreviews();
  input.value = ''; // 清空以便再次选择
}

function renderImagePreviews() {
  const container = document.getElementById('imagePreviewList');
  container.innerHTML = '';
  
  selectedImages.forEach((file, index) => {
    const div = document.createElement('div');
    div.className = 'image-preview-item';
    
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    
    const btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.textContent = '×';
    btn.onclick = () => removeImage(index);
    
    div.appendChild(img);
    div.appendChild(btn);
    container.appendChild(div);
  });
}

function removeImage(index) {
  selectedImages.splice(index, 1);
  renderImagePreviews();
}

async function uploadImages(seedId) {
  const urls = [];
  for (const file of selectedImages) {
    const ext = file.name.split('.').pop();
    const path = seedId + '/' + Date.now() + '_' + Math.random().toString(36).substr(2,9) + '.' + ext;
    
    const { data, error } = await _sbClient.storage.from('comment-images').upload(path, file);
    if (error) {
      console.error('图片上传失败:', error);
      continue;
    }
    
    const { data: urlData } = _sbClient.storage.from('comment-images').getPublicUrl(path);
    urls.push(urlData.publicUrl);
  }
  return urls;
}

async function submitImport() {
 const seed = document.getElementById('importSeed').value.trim().toUpperCase();
 const game = document.getElementById('importGame').value;
 const result = document.getElementById('importResult').value;
 const difficulty = document.getElementById('importDifficulty').value;
 const allTags = selectedTags.slice(0, 5);
 const description = document.getElementById('importDesc').value.trim().slice(0, 150);
 if (!seed) { showToast('请输入种子代码'); return; }
 if (seed.length > 13) { showToast('种子代码不能超过13位'); return; }
 if (!selectedChar) { showToast('请选择角色'); return; }
 if (!_sbReady) { showToast('数据库加载中，请稍候'); return; }
 const { data: { session } } = await _sbClient.auth.getSession();
 if (!session) { closeImport(); openAuth(); showToast('请先登录'); return; }
 const userId = session.user.id;
 const { data: existingData } = await _sbClient.from('seeds').select('id').eq('user_id', userId).eq('seed', seed).eq('game', game).maybeSingle();
 
 if (existingData) {
   // 已存在，提示用户
   showToast('该种子已存在，无需重复导入');
   return;
 }
 
 const { error } = await _sbClient.from('seeds').insert({
 user_id: userId, seed: seed, game: game, character: selectedChar,
 tags: allTags, description: description, victory: result === 'hu', floor_reached: 0
 });
 if (error) { showToast('导入失败：' + error.message); return; }
 
 // 上传图片
 if (selectedImages.length > 0) {
   // 获取刚插入的种子ID
   const { data: newSeed } = await _sbClient.from('seeds').select('id').eq('user_id', userId).eq('seed', seed).eq('game', game).single();
   if (newSeed) {
     const imageUrls = await uploadImages(newSeed.id);
     if (imageUrls.length > 0) {
       const imgMarkdown = '\n\n' + imageUrls.map(url => `![image](${url})`).join('\n');
       await _sbClient.from('seeds').update({ description: description + imgMarkdown }).eq('id', newSeed.id);
     }
   }
 }
 
 selectedImages = [];
 renderImagePreviews();
 closeImport();
 await loadSeedsFromDB();
 showToast('导入成功！');
}

function openAuth() { document.getElementById('authModal').style.display='flex'; switchAuthTab('login'); }
function closeAuth() { document.getElementById('authModal').style.display='none'; }
function switchAuthTab(tab) {
 document.getElementById('tab-login').classList.toggle('active', tab==='login');
 document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
 document.getElementById('auth-login-form').style.display = tab==='login'?'block':'none';
 document.getElementById('auth-signup-form').style.display = tab==='signup'?'block':'none';
 document.getElementById('login-error').textContent = '';
 document.getElementById('signup-error').textContent = '';
}

async async function handleLogin() {
 if (!_sbClient || !_sbReady) { document.getElementById("login-error").textContent = "系统加载中，请稍候重试..."; return; }
 const email = document.getElementById('login-email').value.trim();
 const password = document.getElementById('login-password').value;
 if (!email || !password) { document.getElementById('login-error').textContent = '请填写邮箱和密码'; return; }
 const { error } = await _sbClient.auth.signInWithPassword({ email, password });
 if (error) {
 document.getElementById('login-error').textContent = error.message === 'Invalid login credentials' ? '邮箱或密码错误' : error.message;
 } else {
 closeAuth();
 await loadSeedsFromDB();
 showToast('登录成功!');
 }
}

async function handleSignup() {
 if (!_sbClient || !_sbReady) {
  document.getElementById('signup-error').textContent = '系统加载中，请稍候重试...';
  return;
 }
 const email = document.getElementById('signup-email').value.trim();
 const password = document.getElementById('signup-password').value;
 const confirm = document.getElementById('signup-confirm').value;
 if (!email || !password) { document.getElementById('signup-error').textContent = '请填写所有字段'; return; }
 if (password.length < 6) { document.getElementById('signup-error').textContent = '密码至少6位'; return; }
 if (password !== confirm) { document.getElementById('signup-error').textContent = '两次密码不一致'; return; }
 const btn = document.querySelector('#auth-signup-form .btn-submit');
 const orig = btn ? btn.textContent : '注册';
 if (btn) { btn.textContent = '注册中...'; btn.disabled = true; }
 try {
  const { error } = await _sbClient.auth.signUp({
   email,
   password,
   options: { emailRedirectTo: window.location.origin + '/' }
  });
  if (error) {
   document.getElementById('signup-error').textContent = error.message;
  } else {
   closeAuth();
   showToast('注册成功！请查收验证邮件');
  }
 } finally {
  if (btn) { btn.textContent = orig; btn.disabled = false; }
 }
}

async function logout() {
 if (!_sbReady) return;
 await _sbClient.auth.signOut();
 showToast('已退出登录');
}



// 渲染
